<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Demo</title>
</head>

<body>

    <!-- 
    DOM (Document Object Model)
    - It represents HTML as a tree structure.
    - JavaScript can access and modify HTML elements using DOM.
    - Changes happen dynamically without refreshing the page.
    -->

    <!-- id is a unique identifier for an HTML element -->
    <h1 id="welcome">Default Text</h1>

    <ul></ul>

    <!-- Button to trigger DOM event -->
    <button id="changeText">Change the HTML Content</button>

    <!-- Linking external JS file -->
    <script src="../js/dom-demo.js"></script>
</body>

</html>

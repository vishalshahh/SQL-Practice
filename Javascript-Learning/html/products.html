<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON DOM Example</title>
</head>

<body>

    <!-- 
    THEORY:
    - JSON (JavaScript Object Notation) is used to exchange data.
    - JSON.parse() converts JSON string → JavaScript object.
    - DOM is used to dynamically display data on webpage.
    -->

    <h3>Employee (Static Data)</h3>
    <ul>
        <li>Niti - Trainer</li>
        <li>Nitin - Trainer</li>
        <li>Sakshi - Trainer</li>
        <li>Jatin - Trainer</li>
    </ul>

    <!-- Dynamic section -->
    <h3>Product Data (Dynamic using JSON)</h3>
    <ul id="productList"></ul>

    <script src="../js/products.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Form Validation</title>
</head>

<body>

    <h2>Form Example</h2>

    <form>
        Name: <input type="text" required><br><br>
        Email: <input type="email" required><br><br>
        Password: <input type="password" minlength="6" maxlength="12" required><br><br>
        Age: <input type="number" min="18" max="60" required><br><br>
        Zip Code: <input type="text" pattern="[0-9]{6}" required><br><br>

        <input type="submit">
    </form>

</body>

</html>

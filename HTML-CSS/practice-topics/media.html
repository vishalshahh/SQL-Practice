<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Media Example</title>
</head>

<body>

    <h2>Audio</h2>
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <h2>Video</h2>
    <video controls width="400">
        <source src="video.mp4" type="video/mp4">
    </video>

</body>

</html>
